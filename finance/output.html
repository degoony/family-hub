<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',-apple-system,sans-serif; background:#0f1117; color:#e0e0e0; display:flex; justify-content:center; align-items:center; min-height:100vh; }

  .back-link { display:inline-block; margin-top:20px; font-size:0.8rem; color:#8b8fa3; text-decoration:none; }

async function decrypt() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('error').style.display = 'none';

  try {
    const salt = Uint8Array.from(atob(PAYLOAD.salt), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(PAYLOAD.iv), c => c.charCodeAt(0));
    const ct = Uint8Array.from(atob(PAYLOAD.ct), c => c.charCodeAt(0));

    const keyMaterial = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' },
      keyMaterial,
      { name:'AES-GCM', length:256 },
      false,
      ['decrypt']
    );
    const decrypted = await crypto.subtle.decrypt(
      { name:'AES-GCM', iv }, key, ct
    );
    const html = new TextDecoder().decode(decrypted);

    // Inject floating back-to-hub button into decrypted content
    const hubBtn = '<div style="position:fixed;top:12px;left:12px;z-index:99999;"><a href="https://degoony.github.io/family-hub/" style="display:inline-flex;align-items:center;gap:4px;background:#2d2517;color:#f5f0e8;font-family:-apple-system,sans-serif;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,0.2);-webkit-tap-highlight-color:transparent;">&#8592; Hub</a></div>';
    const injected = html.replace(/<body([^>]*)>/, '<body$1>' + hubBtn);
    // Replace entire page with decrypted content
    document.open();
    document.write(injected.includes(hubBtn) ? injected : html + hubBtn);
    document.close();
  } catch(e) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}
</script>
